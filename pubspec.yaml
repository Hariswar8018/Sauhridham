name: sauhridam
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  firebase_messaging: ^16.0.3
  cloud_functions: ^6.0.3

  flutter_local_notifications: ^22.0.0

  google_fonts: ^8.1.0
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_riverpod: ^3.3.1
  cloud_firestore: ^6.0.2
  firebase_storage: ^13.0.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^10.3.2
  permission_handler: ^12.0.1
  google_sign_in: ^7.2.0
  zego_uikit_prebuilt_call: ^4.24.2
  zego_uikit_signaling_plugin: ^2.8.13
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/